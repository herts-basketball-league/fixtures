name: Deploy Code on Push
on: push
jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.3.6
      with:
        server: ${{ secrets.FTP_CONNECTION }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./
        log-level: verbose
        dry-run: false
        exclude: |
          .git*
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.env
          **/.wellknown/**
          **/cgi-bin/**
          **/box.json
          **/server.json
          **/tests/**
          **/testbox/**
          **/resources/**
          **/_assets/**
          **/WEB-INF/**

    - name: Check the deployed service URL
      uses: jtalk/url-health-check-action@v1.5
      with:
        # Check the following URLs one by one sequentially
        url: 'https://${{ secrets.DOMAIN }}/index.cfm?fwreinit=${{ secrets.FW_REINIT }}'
        # Follow redirects, or just report success on 3xx status codes
        follow-redirect: no # Optional, defaults to "no"
        # Fail this action after this many failed attempts
        max-attempts: 3 # Optional, defaults to 1
        # Delay between retries
        retry-delay: 5s # Optional, only applicable to max-attempts > 1
        # Retry all errors, including 404
        retry-all: no # Optional, defaults to "no"
